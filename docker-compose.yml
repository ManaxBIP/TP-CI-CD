version: '3.8'

services:
  # Backend Express API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tp_backend
    environment:
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5001:5000"
    networks:
      - tp_network

  # Frontend Nginx Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tp_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tp_network

networks:
  tp_network:
    driver: bridge
